<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puntos interactivos</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
  }
  canvas {
    display: block;
  }
</style>
<script>
  // ---- Constantes configurables ----
  const COLOR_FONDO = "#0a0a0a";      // Color de fondo (oscuro)
  const COLOR_DIBUJO = "#ffffff";     // Color de los puntos (blanco)
  const NUM_PUNTOS = 500;             // Cantidad de puntos a dibujar
  const RADIO_PUNTO = 2;              // Radio de cada punto en px
  const RADIO_INFLUENCIA = 50;       // Distancia máxima a la que el ratón afecta a los puntos
  const FUERZA_HUIDA = 30;             // Intensidad con la que los puntos huyen del ratón
  const FRICCION = 0.92;              // Amortiguación de la velocidad (0-1)
  const VELOCIDAD_RETORNO = 0.02;     // Velocidad de vuelta al reposo cuando no hay influencia

  let canvas, ctx;
  let puntos = [];
  let mouse = { x: -9999, y: -9999 };

  class Punto {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.vx = 0;
      this.vy = 0;
    }

    actualizar() {
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const distancia = Math.sqrt(dx * dx + dy * dy) || 0.001;

      if (distancia < RADIO_INFLUENCIA) {
        // Cuanto más cerca del ratón, más rápido huye (proporcional inverso a la distancia)
        const fuerza = (1 - distancia / RADIO_INFLUENCIA) * FUERZA_HUIDA;
        this.vx += (dx / distancia) * fuerza;
        this.vy += (dy / distancia) * fuerza;
      }

      // Fricción para frenar el movimiento con el tiempo
      this.vx *= FRICCION;
      this.vy *= FRICCION;

      this.x += this.vx;
      this.y += this.vy;

      // Mantener los puntos dentro del canvas (rebote simple)
      if (this.x < 0) { this.x = 0; this.vx *= -1; }
      if (this.x > canvas.width) { this.x = canvas.width; this.vx *= -1; }
      if (this.y < 0) { this.y = 0; this.vy *= -1; }
      if (this.y > canvas.height) { this.y = canvas.height; this.vy *= -1; }
    }

    dibujar() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, RADIO_PUNTO, 0, Math.PI * 2);
      ctx.fillStyle = COLOR_DIBUJO;
      ctx.fill();
    }
  }

  function crearPuntos() {
    puntos = [];
    for (let i = 0; i < NUM_PUNTOS; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      puntos.push(new Punto(x, y));
    }
  }

  function redimensionarCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function loop() {
    ctx.fillStyle = COLOR_FONDO;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const p of puntos) {
      p.actualizar();
      p.dibujar();
    }

    requestAnimationFrame(loop);
  }

  function init() {
    canvas = document.getElementById("miCanvas");
    ctx = canvas.getContext("2d");

    redimensionarCanvas();
    crearPuntos();

    window.addEventListener("resize", redimensionarCanvas);

    canvas.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    canvas.addEventListener("mouseleave", () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });

    loop();
  }

  window.addEventListener("DOMContentLoaded", init);
</script>
</head>
<body>
  <canvas id="miCanvas"></canvas>
</body>
</html>
